<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🍓 SOUND TOGGLE · fruit catch</title>
  <style>
    * {
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }
    body {
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(145deg, #1b4a2e 0%, #2e7d5e 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: pan-y pinch-zoom;
    }
    .game-container {
      background: #3b8b6e;
      background-image: radial-gradient(circle at 30% 40%, #56ab91, #1f5e45);
      border-radius: 3rem 3rem 2rem 2rem;
      box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 0 0 2px #c0e0b0;
      padding: 1.2rem 1rem 1.8rem;
      width: min(96vw, 520px);
      margin: 10px auto;
      position: relative;
    }

    /* start overlay */
    .start-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(30, 50, 30, 0.95);
      backdrop-filter: blur(4px);
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 3rem;
      z-index: 10;
      padding: 2rem;
      box-shadow: inset 0 0 30px #5f9b80;
    }
    .start-screen.hidden {
      display: none;
    }
    .start-title {
      font-size: 2.4rem;
      color: #ffe9a7;
      text-shadow: 0 5px 0 #3b5e3b, 0 8px 10px black;
      margin-bottom: 1.8rem;
    }
    .level-box {
      background: #5f7b60;
      border-radius: 60px;
      padding: 0.6rem;
      display: flex;
      gap: 0.5rem;
      box-shadow: inset 0 3px 8px #2f422f, 0 8px 0 #2b4a2b;
      margin-bottom: 2rem;
    }
    .level-option {
      font-size: 1.8rem;
      font-weight: bold;
      padding: 0.8rem 1.8rem;
      border: none;
      border-radius: 50px;
      background: #cdb28b;
      box-shadow: 0 4px 0 #7a5e3b;
      transition: 0.07s;
      cursor: pointer;
    }
    .level-option.selected {
      background: #f9e784;
      box-shadow: 0 0 0 3px #ffcf9a, 0 3px 0 #8b7a42;
      transform: translateY(3px);
    }
    .play-btn {
      background: #fedb5f;
      border: none;
      font-size: 2.2rem;
      font-weight: 800;
      padding: 1rem 2.8rem;
      border-radius: 50px;
      box-shadow: 0 8px 0 #a47e3b, 0 12px 20px #1d3b1d;
      transition: 0.08s;
      color: #25451e;
      margin-top: 1.5rem;
      cursor: pointer;
    }
    .play-btn:active {
      transform: translateY(8px);
      box-shadow: 0 2px 0 #a47e3b, 0 8px 15px #1d3b1d;
    }
    .saved-indicator {
      font-size: 1.2rem;
      color: #c7f0b2;
      background: #1e482e;
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      margin-top: 1rem;
    }

    /* header: score + lives + STAGE badge + sound toggle */
    .stats {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #2c5a48;
      padding: 0.6rem 1.2rem;
      border-radius: 60px;
      margin-bottom: 1.2rem;
      box-shadow: inset 0 3px 6px #193e30, 0 5px 0 #1d3d30;
      color: #f9f1b6;
      font-weight: bold;
      font-size: 1.5rem;
      border: 1px solid #efd5a0;
    }
    .stage-badge {
      background: #b47c48;
      padding: 0.2rem 1.2rem;
      border-radius: 40px;
      font-size: 1.3rem;
      box-shadow: inset 0 -2px 0 #5e3a1f;
      color: #ffefc0;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .score-box {
      background: #221c1a;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      box-shadow: inset 0 -2px 0 #6b4f3a;
    }
    .sound-toggle {
      background: #4f7850;
      border: none;
      font-size: 1.8rem;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      cursor: pointer;
      box-shadow: inset 0 -2px 0 #2a4a2a, 0 3px 0 #1d3b1d;
      transition: 0.07s;
      color: #f9f1b6;
      line-height: 1.4;
    }
    .sound-toggle:active {
      transform: translateY(3px);
      box-shadow: inset 0 -2px 0 #2a4a2a;
    }
    .lives {
      display: flex;
      gap: 0.4rem;
    }
    .heart {
      font-size: 2rem;
      line-height: 1;
      filter: drop-shadow(0 3px 2px #411);
    }
    .heart.half { opacity: 0.3; }

    .canvas-wrapper {
      background: #a7d0c0;
      border-radius: 40px 40px 30px 30px;
      box-shadow: inset 0 -5px 8px #2f624b, inset 0 8px 8px #deffea, 0 10px 12px rgba(0,0,0,0.4);
      padding: 10px;
      margin-bottom: 1.2rem;
      border: 2px solid #ebc87e;
      transition: background 0.3s;
    }
    canvas {
      display: block;
      width: 100%;
      height: auto;
      background: #c2e8da;
      border-radius: 30px;
      box-shadow: inset 0 0 0 3px #9abf90;
      touch-action: none;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      margin-top: 1rem;
    }
    .difficulty-group {
      display: flex;
      flex: 2 1 auto;
      background: #4d3f2b;
      border-radius: 50px;
      padding: 5px;
      opacity: 0.5;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .difficulty-group.active {
      opacity: 1;
      pointer-events: auto;
    }
    .difficulty-btn {
      flex: 1;
      border: none;
      background: #b99e7c;
      color: #2f2a1f;
      font-weight: 600;
      font-size: 1.2rem;
      padding: 0.6rem 0.2rem;
      border-radius: 40px;
      margin: 2px;
      box-shadow: 0 3px 0 #6b4f34, 0 4px 6px black;
      transition: 0.07s;
    }
    .difficulty-btn.active {
      background: #fedb9f;
      box-shadow: 0 0 0 2px #f9f0b0, 0 2px 0 #8b6d48;
      transform: translateY(2px);
      color: #112211;
      font-weight: 800;
    }
    .action-btns {
      display: flex;
      gap: 0.5rem;
    }
    .new-game-btn, .quit-btn {
      border: none;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 0.6rem 1.2rem;
      border-radius: 50px;
      box-shadow: 0 5px 0 #8b691f, 0 6px 8px #1f2e14;
      transition: 0.08s;
      color: #2d3515;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    .new-game-btn {
      background: #e3b35c;
    }
    .quit-btn {
      background: #c09a6b;
      box-shadow: 0 5px 0 #7a5a34;
    }
    .new-game-btn:active, .quit-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #8b691f;
    }
    .footer-note {
      color: #efffcf;
      text-align: center;
      margin-top: 0.8rem;
      font-size: 0.9rem;
      font-weight: 500;
      text-shadow: 0 2px 4px #194d3a;
    }
    .arrow-hint {
      display: inline-block;
      background: #3f613f;
      padding: 0.2rem 1rem;
      border-radius: 30px;
      margin-left: 8px;
      font-size: 0.9rem;
    }
    @media (max-width: 450px) {
      .stats { font-size: 1.2rem; }
      .heart { font-size: 1.6rem; }
      .sound-toggle { font-size: 1.4rem; padding: 0.2rem 0.8rem; }
    }
  </style>
</head>
<body>
<div class="game-container" id="gameContainer" style="position: relative;">
  <!-- START SCREEN -->
  <div class="start-screen" id="startScreen">
    <div class="start-title">🍒 CHOOSE STAGE 🍒</div>
    <div class="level-box">
      <button class="level-option" data-level="easy">🌱 EASY</button>
      <button class="level-option selected" data-level="medium">🍂 MEDIUM</button>
      <button class="level-option" data-level="hard">🔥 HARD</button>
    </div>
    <button class="play-btn" id="playBtn">▶ PLAY</button>
    <div class="saved-indicator" id="savedLevelMsg"></div>
  </div>

  <!-- GAME HEADER with SOUND TOGGLE -->
  <div class="stats">
    <div class="stage-badge" id="stageDisplay">MEDIUM</div>
    <div class="score-box">🍒 <span id="scoreDisplay">0</span></div>
    <button class="sound-toggle" id="soundToggleBtn">🔊 ON</button>
    <div class="lives" id="livesContainer">
      <span class="heart" id="heart1">❤️</span>
      <span class="heart" id="heart2">❤️</span>
      <span class="heart" id="heart3">❤️</span>
    </div>
  </div>

  <div class="canvas-wrapper" id="canvasWrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
  </div>

  <div class="controls">
    <div class="difficulty-group" id="difficultyGroup">
      <button class="difficulty-btn" data-diff="easy">🌱 EASY</button>
      <button class="difficulty-btn active" data-diff="medium">🍂 MEDIUM</button>
      <button class="difficulty-btn" data-diff="hard">🔥 HARD</button>
    </div>
    <div class="action-btns">
      <button class="new-game-btn" id="newGameBtn">🔄 NEW GAME</button>
      <button class="quit-btn" id="quitBtn">🚪 QUIT</button>
    </div>
  </div>
  <div class="footer-note">
    ←  →  move with arrow keys  <span class="arrow-hint">⬅️ ➡️</span>
  </div>
</div>

<script>
  (function() {
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const CANVAS_W = 400, CANVAS_H = 400;

    // basket dimensions
    const BASKET_BASE_WIDTH = 92;
    const BASKET_TOP_WIDTH = 104;
    const BASKET_HEIGHT = 44;
    const BASKET_Y = CANVAS_H - BASKET_HEIGHT - 10;

    const FRUIT_RADIUS = 18;
    const FRUIT_TYPES = ['🍎','🍊','🍇','🍓','🍒','🍑','🍉','🍌'];
    const SPEEDS = { easy: 1.7, medium: 3.5, hard: 6.2 };

    // Stage themes
    const STAGE_THEMES = {
      easy: { bg: ['#c2e8da','#a1d5b5'], badge: '🌱 EASY' },
      medium: { bg: ['#e0cfb0','#c4a56b'], badge: '🍂 MEDIUM' },
      hard: { bg: ['#c9a88b','#b04f4f'], badge: '🔥 HARD' }
    };

    // --- Audio context & state with SOUND TOGGLE ---
    let audioCtx = null;
    let soundEnabled = true;          // default ON
    const soundToggleBtn = document.getElementById('soundToggleBtn');

    function initAudio() {
      if (audioCtx) return;
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function playTone(type, duration = 0.15) {
      if (!soundEnabled) return;               // <-- sound OFF check
      if (!audioCtx) return;
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      const now = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      
      if (type === 'catch') {
        osc.frequency.value = 660;
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
      } else if (type === 'miss') {
        osc.frequency.value = 220;
        gain.gain.setValueAtTime(0.25, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + duration);
      } else if (type === 'gameover') {
        osc.frequency.value = 150;
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(80, now + 0.3);
        duration = 0.5;
      }
      osc.start(now);
      osc.stop(now + duration);
    }

    // Toggle sound on/off and update button
    function toggleSound() {
      soundEnabled = !soundEnabled;
      soundToggleBtn.textContent = soundEnabled ? '🔊 ON' : '🔇 OFF';
      // If turning on and context suspended, try to resume
      if (soundEnabled && audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
    }
    soundToggleBtn.addEventListener('click', toggleSound);

    // --- game state ---
    let score = 0, lives = 3;
    let gameActive = false;
    let fruit = null;
    let basketX = (CANVAS_W - BASKET_BASE_WIDTH) / 2;
    let moveToX = basketX;
    let currentDifficulty = 'medium';
    let fallSpeed = SPEEDS.medium;

    // UI elements
    const scoreSpan = document.getElementById('scoreDisplay');
    const stageBadge = document.getElementById('stageDisplay');
    const canvasWrapper = document.getElementById('canvasWrapper');
    const hearts = {
      1: document.getElementById('heart1'),
      2: document.getElementById('heart2'),
      3: document.getElementById('heart3')
    };
    const diffBtns = document.querySelectorAll('.difficulty-btn');
    const difficultyGroup = document.getElementById('difficultyGroup');
    const newGameBtn = document.getElementById('newGameBtn');
    const quitBtn = document.getElementById('quitBtn');

    // start screen
    const startScreen = document.getElementById('startScreen');
    const levelOptions = document.querySelectorAll('.level-option');
    const playBtn = document.getElementById('playBtn');
    const savedMsg = document.getElementById('savedLevelMsg');

    const STORAGE_KEY = 'fruitCatch_level';

    // ----- apply stage theme -----
    function applyStageTheme(level) {
      const theme = STAGE_THEMES[level] || STAGE_THEMES.medium;
      stageBadge.textContent = theme.badge;
      if (level === 'easy') canvasWrapper.style.background = 'linear-gradient(0deg, #b3e0d0, #b1f0c0)';
      else if (level === 'medium') canvasWrapper.style.background = 'linear-gradient(0deg, #d4b28c, #f5e2b6)';
      else canvasWrapper.style.background = 'linear-gradient(0deg, #bc7f5a, #ffbaba)';
    }

    // ----- load & save level -----
    function loadSavedLevel() {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved && ['easy','medium','hard'].includes(saved)) {
        currentDifficulty = saved;
        fallSpeed = SPEEDS[saved];
        levelOptions.forEach(opt => {
          opt.classList.toggle('selected', opt.dataset.level === saved);
        });
        diffBtns.forEach(btn => {
          btn.classList.toggle('active', btn.dataset.diff === saved);
        });
        savedMsg.innerText = `⭐ saved: ${saved}`;
      } else {
        savedMsg.innerText = '⚡ default medium';
      }
      applyStageTheme(currentDifficulty);
    }

    function saveLevel(level) {
      localStorage.setItem(STORAGE_KEY, level);
      savedMsg.innerText = `💾 saved: ${level}`;
    }

    // ----- enable/disable difficulty buttons based on gameActive -----
    function setDifficultyEnabled(enabled) {
      if (enabled) {
        difficultyGroup.classList.add('active');
      } else {
        difficultyGroup.classList.remove('active');
      }
    }

    // ----- game helpers -----
    function updateLivesUI() {
      for (let i = 1; i <= 3; i++) {
        hearts[i].style.opacity = i <= lives ? '1' : '0.2';
        if (i > lives) hearts[i].classList.add('half');
        else hearts[i].classList.remove('half');
      }
    }
    function updateScoreUI() { scoreSpan.textContent = score; }

    function spawnFruit() {
      if (!gameActive || fruit !== null) return;
      const x = 30 + Math.random() * (CANVAS_W - 60);
      const randomType = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
      fruit = { x, y: FRUIT_RADIUS + 2, typeChar: randomType };
    }

    function resetGame() {
      lives = 3;
      score = 0;
      fruit = null;
      basketX = (CANVAS_W - BASKET_BASE_WIDTH) / 2;
      moveToX = basketX;
      updateLivesUI();
      updateScoreUI();
      if (gameActive) spawnFruit();
    }

    // collision (unchanged)
    function isFruitCaught() {
      if (!fruit) return false;
      const fX = fruit.x, fY = fruit.y, r = FRUIT_RADIUS;
      const leftBottom = basketX;
      const rightBottom = basketX + BASKET_BASE_WIDTH;
      const leftTop = basketX - (BASKET_TOP_WIDTH - BASKET_BASE_WIDTH) / 2;
      const rightTop = basketX + BASKET_BASE_WIDTH + (BASKET_TOP_WIDTH - BASKET_BASE_WIDTH) / 2;
      const topY = BASKET_Y, bottomY = BASKET_Y + BASKET_HEIGHT;

      if (fX + r < leftTop || fX - r > rightTop || fY + r < topY || fY - r > bottomY) return false;

      const poly = [
        { x: leftTop, y: topY }, { x: rightTop, y: topY },
        { x: rightBottom, y: bottomY }, { x: leftBottom, y: bottomY }
      ];

      if (pointInPolygon(fX, fY, poly)) return true;

      for (let i = 0; i < poly.length; i++) {
        const p1 = poly[i], p2 = poly[(i+1)%poly.length];
        if (pointSegmentDistance(fX, fY, p1.x, p1.y, p2.x, p2.y) <= r) return true;
      }
      for (let v of poly) {
        const dx = fX - v.x, dy = fY - v.y;
        if (dx*dx + dy*dy <= r*r) return true;
      }
      return false;
    }

    function pointInPolygon(px, py, vertices) {
      let inside = false;
      for (let i = 0, j = vertices.length-1; i < vertices.length; j = i++) {
        const xi = vertices[i].x, yi = vertices[i].y;
        const xj = vertices[j].x, yj = vertices[j].y;
        const intersect = ((yi > py) !== (yj > py)) && (px < (xj - xi) * (py - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    function pointSegmentDistance(px, py, ax, ay, bx, by) {
      const abx = bx - ax, aby = by - ay;
      const dx = px - ax, dy = py - ay;
      const t = (abx * dx + aby * dy) / (abx * abx + aby * aby || 1);
      const tClamped = Math.max(0, Math.min(1, t));
      const projx = ax + tClamped * abx;
      const projy = ay + tClamped * aby;
      const dx2 = px - projx, dy2 = py - projy;
      return Math.sqrt(dx2*dx2 + dy2*dy2);
    }

    function missFruit() {
      if (!gameActive) return;
      lives--;
      updateLivesUI();
      playTone('miss', 0.2);
      if (lives <= 0) {
        gameActive = false;
        fruit = null;
        playTone('gameover', 0.5);
        setDifficultyEnabled(true);
        return;
      }
      fruit = null;
      spawnFruit();
    }

    function catchFruit() {
      if (!gameActive || !fruit) return;
      score++;
      updateScoreUI();
      playTone('catch', 0.15);
      fruit = null;
      spawnFruit();
    }

    function updateGame() {
      if (!gameActive) return;
      if (fruit === null) { spawnFruit(); return; }
      fruit.y += fallSpeed;
      if (isFruitCaught()) { catchFruit(); return; }
      if (fruit.y - FRUIT_RADIUS > CANVAS_H) missFruit();
    }

    function moveBasket() {
      const maxLeft = CANVAS_W - BASKET_BASE_WIDTH;
      moveToX = Math.max(0, Math.min(moveToX, maxLeft));
      basketX = moveToX;
    }

    // drawing (game over centered)
    function draw() {
      ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
      const grad = ctx.createLinearGradient(0, 0, 0, 200);
      if (currentDifficulty === 'easy') {
        grad.addColorStop(0, '#b3f0cf'); grad.addColorStop(1, '#8fd0aa');
      } else if (currentDifficulty === 'medium') {
        grad.addColorStop(0, '#f5e2b6'); grad.addColorStop(1, '#d4b28c');
      } else {
        grad.addColorStop(0, '#ffbaba'); grad.addColorStop(1, '#bc7f5a');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, CANVAS_W, 200);

      const leftBottom = basketX;
      const rightBottom = basketX + BASKET_BASE_WIDTH;
      const leftTop = basketX - (BASKET_TOP_WIDTH - BASKET_BASE_WIDTH) / 2;
      const rightTop = basketX + BASKET_BASE_WIDTH + (BASKET_TOP_WIDTH - BASKET_BASE_WIDTH) / 2;

      ctx.shadowColor = '#3d2b1a'; ctx.shadowBlur = 10; ctx.shadowOffsetY = 5;
      ctx.beginPath();
      ctx.moveTo(leftTop, BASKET_Y); ctx.lineTo(rightTop, BASKET_Y);
      ctx.lineTo(rightBottom, BASKET_Y + BASKET_HEIGHT); ctx.lineTo(leftBottom, BASKET_Y + BASKET_HEIGHT);
      ctx.closePath();
      ctx.fillStyle = '#c19a6b'; ctx.fill();
      ctx.shadowBlur = 4;
      ctx.fillStyle = '#a87346';
      ctx.beginPath();
      ctx.moveTo(leftTop+6, BASKET_Y-2); ctx.lineTo(rightTop-6, BASKET_Y-2);
      ctx.lineTo(rightBottom-8, BASKET_Y + BASKET_HEIGHT-4); ctx.lineTo(leftBottom+8, BASKET_Y + BASKET_HEIGHT-4);
      ctx.closePath(); ctx.fill();
      ctx.shadowBlur = 8;
      ctx.strokeStyle = '#efc48c'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(leftTop-2, BASKET_Y-2); ctx.lineTo(rightTop+2, BASKET_Y-2); ctx.stroke();
      ctx.strokeStyle = '#8b6946';
      ctx.beginPath(); ctx.moveTo(leftBottom-2, BASKET_Y + BASKET_HEIGHT-2); ctx.lineTo(rightBottom+2, BASKET_Y + BASKET_HEIGHT-2); ctx.stroke();
      ctx.shadowBlur = 0; ctx.shadowOffsetY = 0;

      if (fruit && gameActive) {
        ctx.shadowColor = '#fffaad'; ctx.shadowBlur = 20;
        ctx.beginPath(); ctx.arc(fruit.x, fruit.y, FRUIT_RADIUS, 0, 2*Math.PI);
        ctx.fillStyle = '#fffee8'; ctx.fill();
        ctx.shadowBlur = 8; ctx.strokeStyle = '#cc9f60'; ctx.lineWidth = 2.5; ctx.stroke();
        ctx.font = `${FRUIT_RADIUS+6}px 'Segoe UI Emoji', 'Apple Color Emoji'`;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.shadowBlur = 12; ctx.shadowColor = '#553311';
        ctx.fillText(fruit.typeChar, fruit.x, fruit.y-1);
      }

      if (!gameActive && lives === 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        ctx.font = 'bold 36px system-ui, sans-serif';
        ctx.fillStyle = '#ffddbb';
        ctx.shadowColor = '#a00000';
        ctx.shadowBlur = 14;
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', CANVAS_W/2, CANVAS_H/2 - 10);
        ctx.shadowBlur = 0;
        ctx.textAlign = 'left';
      } else if (!gameActive && lives > 0) {
        ctx.fillStyle = 'rgba(0,0,0,0.03)';
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      }

      ctx.font = 'bold 18px monospace';
      ctx.fillStyle = '#2f4510';
      ctx.shadowBlur = 0;
      ctx.fillText(`x${score}`, 20, 50);
    }

    // --- controls ---
    function handleMove(clientX) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = CANVAS_W / rect.width;
      let canvasX = (clientX - rect.left) * scaleX;
      let target = canvasX - BASKET_BASE_WIDTH/2;
      const maxLeft = CANVAS_W - BASKET_BASE_WIDTH;
      moveToX = Math.max(0, Math.min(target, maxLeft));
    }

    window.addEventListener('keydown', (e) => {
      if (!gameActive) return;
      const step = 24;
      if (e.key === 'ArrowLeft') {
        e.preventDefault();
        moveToX = Math.max(0, basketX - step);
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        const maxLeft = CANVAS_W - BASKET_BASE_WIDTH;
        moveToX = Math.min(maxLeft, basketX + step);
      }
    });

    canvas.addEventListener('mousemove', (e) => { e.preventDefault(); if (gameActive) handleMove(e.clientX); });
    canvas.addEventListener('mousedown', (e) => { e.preventDefault(); if (gameActive) handleMove(e.clientX); });
    canvas.addEventListener('touchstart', (e) => {
      e.preventDefault(); if (gameActive && e.touches[0]) handleMove(e.touches[0].clientX);
    });
    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault(); if (gameActive && e.touches[0]) handleMove(e.touches[0].clientX);
    });

    // difficulty buttons (only when enabled)
    diffBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        if (!difficultyGroup.classList.contains('active')) return;
        diffBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentDifficulty = btn.dataset.diff;
        fallSpeed = SPEEDS[currentDifficulty];
        applyStageTheme(currentDifficulty);
        saveLevel(currentDifficulty);
        levelOptions.forEach(opt => {
          opt.classList.toggle('selected', opt.dataset.level === currentDifficulty);
        });
      });
    });

    // start screen
    levelOptions.forEach(opt => {
      opt.addEventListener('click', () => {
        levelOptions.forEach(o => o.classList.remove('selected'));
        opt.classList.add('selected');
      });
    });

    function startGame() {
      initAudio(); // first click initializes audio
      if (soundEnabled && audioCtx && audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      let selectedLevel = 'medium';
      levelOptions.forEach(opt => {
        if (opt.classList.contains('selected')) selectedLevel = opt.dataset.level;
      });
      currentDifficulty = selectedLevel;
      fallSpeed = SPEEDS[selectedLevel];
      diffBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.diff === selectedLevel);
      });
      applyStageTheme(selectedLevel);
      saveLevel(selectedLevel);
      gameActive = true;
      setDifficultyEnabled(false);
      resetGame();
      startScreen.classList.add('hidden');
    }
    playBtn.addEventListener('click', startGame);

    newGameBtn.addEventListener('click', () => {
      initAudio();
      if (!gameActive) {
        startGame();
      } else {
        resetGame();
      }
    });

    quitBtn.addEventListener('click', () => {
      gameActive = false;
      fruit = null;
      setDifficultyEnabled(true);
      startScreen.classList.remove('hidden');
    });

    // initial load
    window.addEventListener('load', () => {
      loadSavedLevel();
      gameActive = false;
      fruit = null;
      startScreen.classList.remove('hidden');
      setDifficultyEnabled(true);
      basketX = (CANVAS_W - BASKET_BASE_WIDTH) / 2;
      moveToX = basketX;
      updateLivesUI();
      updateScoreUI();
      gameLoop();
    });

    function gameLoop() {
      moveBasket();
      updateGame();
      draw();
      requestAnimationFrame(gameLoop);
    }
  })();
</script>
</body>
</html>
